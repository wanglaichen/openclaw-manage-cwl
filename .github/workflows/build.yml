name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  # 定时检查构建状态
  schedule:
    # 每天下午6点检查最后一次构建状态
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      check_status:
        description: '手动检查最后一次运行状态'
        required: false
        default: 'true'

# 取消同一分支上的旧构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            label: Windows

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust 工具链 ──────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # ── Node.js ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── 构建 ─────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 上传构建产物 ─────────────────────────────────────
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ── 通知 ───────────────────────────────────────────────
  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')

    steps:
      - name: 获取最后一次运行信息
        id: last_run
        run: |
          # 获取最后一次 workflow 运行
          RUN_ID=$(gh run list --workflow "${{ github.workflow }}" --status success -L 1 --json id --jq '.[0].id' 2>/dev/null || echo "")
          if [ -n "$RUN_ID" ]; then
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
            echo "✅ 最后一次构建成功" > status.txt
          else
            echo "❌ 未找到成功的构建" > status.txt
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 飞书通知
        if: steps.last_run.outputs.run_id != ''
        uses: satackey/action-feishu-notify@v1
        with:
          # 飞书机器人 Webhook URL（需要在 GitHub Secrets 中配置）
          # 请在 GitHub Repo -> Settings -> Secrets 中添加 FEISHU_WEBHOOK
          webhook_url: ${{ secrets.FEISHU_WEBHOOK }}
          title: '🎉 OpenClaw Manager 构建成功'
          content: |
            ## ✅ 构建完成
            
            - **分支**: main
            - **状态**: 成功
            - **运行ID**: ${{ steps.last_run.outputs.run_id }}
            
            ---
            *来自 GitHub Actions 自动通知*
        continue-on-error: true

      - name: 备选通知（控制台输出）
        if: steps.last_run.outputs.run_id == ''
        run: |
          echo "未找到成功的构建，跳过通知"
